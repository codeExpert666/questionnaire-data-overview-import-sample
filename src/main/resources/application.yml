spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/questionnaire?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: 127.0.0.1
      port: 6379

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

questionnaire:
  import:
    # 上传文件大小的业务上限；应与 spring.servlet.multipart.max-file-size 保持一致或更小。
    max-file-size-bytes: 20971520
    # 单个工作簿最多允许读取的数据行数，不含表头；超过后立即中断导入。
    max-data-rows: 100000
    # 行级错误最多返回数量；达到上限后停止解析，避免大文件持续消耗内存。
    max-errors: 200
    # 问卷聚合批量写库阈值；写库仍在导入事务内，失败时会整体回滚。
    answer-batch-size: 100
    # 推荐意愿 1-6 自动归类为贬损用户。
    detractor-max-score: 6
    # 推荐意愿 7-8 自动归类为被动用户，9-10 自动归类为推荐用户。
    passive-max-score: 8
